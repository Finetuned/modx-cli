# Command Messages - English
# This file contains command runtime messages (success, info, warnings)
# Keyed by command namespace and action, using Symfony %param% substitution format

resource:
  create:
    success: 'Resource created successfully'
  delete:
    success: 'Resource deleted successfully (moved to trash)'
    failed: 'Failed to delete resource'
  update:
    success: 'Resource updated successfully'
    failed: 'Failed to update resource'
  erase:
    success: 'Resource erased successfully (permanently deleted)'
    not_in_trash: 'Resource "%pagetitle%" (ID: %id%) is not in the trash'
    use_delete_hint: "Use 'resource:delete' to move it to trash first"
    irreversible_warning: 'WARNING: This operation is irreversible!'
    failed: 'Failed to erase resource'
  get:
    not_found: 'Resource not found'
